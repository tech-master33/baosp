title: "[Question] "
body:
  - type: markdown
    attributes:
      value: |
        Ask anything about BAOSP — setting it up, using it, or building on it.
        There are no wrong questions. You do not need technical knowledge to ask.
        If your question is about a specific app, you may also ask there directly:
        — Screen reader: github.com/tech-master33/andrdscren/discussions
        — TTS engine: github.com/tech-master33/aotts/discussions
        — Launcher: github.com/tech-master33/aoler/discussions
        If you found a bug, open a Bug report issue instead.

  - type: textarea
    id: question
    attributes:
      label: What is your question
      description: Describe what you are trying to do and where you are stuck.
      placeholder: "Example: I downloaded all three APKs from the nightly release. What order should I install them in, and do I need to do anything special after installing each one?"
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried
      description: This helps avoid repeating suggestions you have already tested.
      placeholder: "Example: I installed them in any order and restarted. Everything seems to work but I am not sure if I have done it correctly."
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: What is your question about
      options:
        - Installing the nightly APKs
        - Setting up the full stack for the first time
        - Using andrdscren, aotts, and aoler together
        - Device compatibility
        - Building BAOSP from source
        - Contributing a patch or pull request
        - Something else
    validations:
      required: false

  - type: input
    id: device
    attributes:
      label: Android version and device (if relevant)
      placeholder: "Example: Android 11, Samsung Galaxy A32"
    validations:
      required: false
